# Render Blueprint — defines both backend + frontend services
services:
  # ── Backend API (FastAPI) ──────────────────────────────
  - type: web
    name: network-analytics-api
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/network-prototype
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_BACKEND
        value: networkx
      - key: LOGIN_USERNAME
        value: admin
      - key: LOGIN_PASSWORD
        value: admin123
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: mock

  # ── Frontend (React + Vite) ────────────────────────────
  - type: web
    name: network-analytics-ui
    runtime: static
    repo: https://github.com/YOUR_USERNAME/network-prototype
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        fromService:
          name: network-analytics-api
          type: web
          property: host
        # Appends /api to the backend URL
        prefix: https://
        suffix: /api
